<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80" role="img" aria-label="DonaTalk logo">
  <title>DonaTalk</title>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9BF96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0956A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Speech bubble (icon area ~70x60, centered vertically in 80px height) -->
  <!-- Translate to center vertically: top offset = (80 - 60) / 2 = 10 -->
  <g transform="translate(5, 10)">
    <!-- Speech bubble rounded rectangle body, scaled to ~58x42 -->
    <rect x="2" y="2" width="56" height="40" rx="11" ry="11" fill="url(#logoGrad)" />

    <!-- Tail at bottom-left -->
    <polygon points="8,40 2,55 20,40" fill="url(#logoGrad)" />
    <!-- Tail overlap to smooth join -->
    <rect x="2" y="36" width="19" height="7" rx="0" fill="url(#logoGrad)" />

    <!-- Heart shape (darker orange) centered in bubble -->
    <path
      d="M31,34
         C31,34 14,25 14,16.5
         C14,12.1 17.1,8.5 21,8.5
         C23.7,8.5 26.1,10 27.7,12.3
         C28.2,13 29,13.5 30,13.5
         C31,13.5 31.8,13 32.3,12.3
         C33.9,10 36.3,8.5 39,8.5
         C42.9,8.5 46,12.1 46,16.5
         C46,25 31,34 31,34 Z"
      fill="#E0652E"
    />
  </g>

  <!-- Wordmark: "DonaTalk" to the right of the icon -->
  <!-- Icon occupies ~0-75px, wordmark starts at x=80 -->
  <text
    x="80"
    y="51"
    font-family="Arial, Helvetica, sans-serif"
    font-size="36"
    font-weight="bold"
    letter-spacing="-0.5"
  >
    <tspan fill="#2C3E50">Dona</tspan><tspan fill="#E74C3C">Talk</tspan>
  </text>
</svg>
