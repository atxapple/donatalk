<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="DonaTalk icon">
  <title>DonaTalk Icon</title>
  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9BF96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0956A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Speech bubble rounded rectangle body -->
  <rect x="2" y="2" width="40" height="34" rx="9" ry="9" fill="url(#bubbleGrad)" />

  <!-- Tail at bottom-left -->
  <polygon points="6,34 2,44 15,34" fill="url(#bubbleGrad)" />
  <!-- Tail overlap to smooth join -->
  <rect x="2" y="30" width="14" height="6" rx="0" fill="url(#bubbleGrad)" />

  <!-- Heart shape (darker orange) centered in bubble -->
  <path
    d="M24,29
       C24,29 11,21 11,14.5
       C11,10.9 13.7,8 17,8
       C19.2,8 21.2,9.2 22.5,11
       C22.9,11.6 23.5,12 24,12
       C24.5,12 25.1,11.6 25.5,11
       C26.8,9.2 28.8,8 31,8
       C34.3,8 37,10.9 37,14.5
       C37,21 24,29 24,29 Z"
    fill="#E0652E"
  />
</svg>
