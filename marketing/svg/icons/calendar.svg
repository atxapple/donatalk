<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#2C3E50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Calendar body -->
  <rect x="5" y="9" width="30" height="28" rx="3" />
  <!-- Top bar / header area -->
  <line x1="5" y1="18" x2="35" y2="18" />
  <!-- Hanger pegs -->
  <line x1="13" y1="5" x2="13" y2="13" />
  <line x1="27" y1="5" x2="27" y2="13" />
  <!-- Date grid dots - row 1 -->
  <circle cx="12" cy="24" r="1" fill="#2C3E50" />
  <circle cx="20" cy="24" r="1" fill="#2C3E50" />
  <!-- Date grid dots - row 2 -->
  <circle cx="12" cy="31" r="1" fill="#2C3E50" />
  <circle cx="20" cy="31" r="1" fill="#2C3E50" />
  <!-- Clock overlay (bottom-right, partially overlapping calendar) -->
  <circle cx="36" cy="34" r="8" />
  <!-- Clock hands -->
  <line x1="36" y1="34" x2="36" y2="29" />
  <line x1="36" y1="34" x2="40" y2="34" />
</svg>
