<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../brand.css">
  <title>DonaTalk — Medium Rectangle 300x250</title>
  <style>
    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .banner {
      width: 300px;
      height: 250px;
      background: #2C3E50;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 0;
      border: 1px solid #3498DB;
      box-sizing: border-box;
    }

    .banner__logo {
      display: flex;
      align-items: baseline;
      margin-bottom: 18px;
    }

    .banner__logo-dona {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 20px;
      color: #FFFFFF;
      letter-spacing: -0.3px;
    }

    .banner__logo-talk {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 20px;
      color: #F8A5A5;
      letter-spacing: -0.3px;
    }

    .banner__headline {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 20px;
      line-height: 1.25;
      color: #FFFFFF;
      text-align: center;
      margin-bottom: 12px;
    }

    .banner__sub {
      font-family: var(--font-family);
      font-weight: var(--font-regular);
      font-size: 14px;
      color: #ECF0F1;
      text-align: center;
      line-height: 1.4;
      margin-bottom: 22px;
      opacity: 0.88;
    }

    .banner__cta {
      display: inline-block;
      padding: 10px 28px;
      background: #C26148;
      color: #FFFFFF;
      font-family: var(--font-family);
      font-weight: var(--font-semibold);
      font-size: 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="banner__logo">
      <img src="../png/DonaTalk_icon_88x77.png" height="28" alt="DonaTalk" style="margin-right:6px;">
      <span class="banner__logo-dona">Dona</span><span class="banner__logo-talk">Talk</span>
    </div>

    <h2 class="banner__headline">Get Warm Meetings<br>by Giving Back</h2>

    <p class="banner__sub">Donate to your prospect's cause.</p>

    <a class="banner__cta" href="https://app.donatalk.com/pitcher/signup">Sign Up Free</a>
  </div>
</body>
</html>
