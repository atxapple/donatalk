<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="../../brand.css">
  <title>Slide 5 – CTA</title>
  <style>
    .slide {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      background-color: #2C3E50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
    }

    /* Accent line at top */
    .accent-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #F1C40F 0%, #E74C3C 100%);
    }

    /* Faint heart watermark */
    .watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.05;
      pointer-events: none;
    }

    .watermark svg {
      width: 680px;
      height: 680px;
      fill: #F8A5A5;
    }

    /* Content wrapper */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 860px;
    }

    /* Logo at top */
    .logo-top .logo-text {
      font-size: 42px;
      letter-spacing: -0.5px;
    }

    /* Override logo colors for dark background */
    .logo-top .logo-text .dona {
      color: rgba(255, 255, 255, 0.85);
    }

    .logo-top .logo-text .talk {
      color: #F8A5A5;
    }

    /* Main headline */
    .headline {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 44px;
      color: #FFFFFF;
      line-height: 1.3;
    }

    /* CTA block */
    .cta-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Override cta-button size for this slide */
    .cta-block .cta-button {
      font-size: 22px;
      padding: 20px 56px;
      border-radius: 6px;
      letter-spacing: 0.01em;
      background-color: #C26148;
    }

    /* URL below button */
    .site-url {
      font-family: var(--font-family);
      font-weight: var(--font-regular);
      font-size: 20px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.04em;
    }

    /* Tagline at bottom */
    .tagline {
      position: absolute;
      bottom: 52px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: var(--font-family);
      font-weight: var(--font-light);
      font-size: 18px;
      color: #95A5A6;
      letter-spacing: 0.02em;
    }

    /* Slide counter */
    .slide-counter {
      position: absolute;
      bottom: 48px;
      left: 52px;
      font-family: var(--font-family);
      font-weight: var(--font-light);
      font-size: 18px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="slide">

    <!-- Accent line at top -->
    <div class="accent-line"></div>

    <!-- Faint heart watermark -->
    <div class="watermark">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 88 C50 88 10 60 10 35 C10 20 20 10 35 10 C42 10 48 14 50 18 C52 14 58 10 65 10 C80 10 90 20 90 35 C90 60 50 88 50 88Z"/>
      </svg>
    </div>

    <!-- Main content -->
    <div class="content">

      <!-- DonaTalk logo -->
      <div class="logo-top">
        <span class="logo-text"><span class="dona">Dona</span><span class="talk">Talk</span></span>
      </div>

      <!-- Headline -->
      <h1 class="headline">Turn cold outreach into<br>warm introductions</h1>

      <!-- CTA button + URL -->
      <div class="cta-block">
        <a href="https://app.donatalk.com" class="cta-button">Join DonaTalk Free</a>
        <span class="site-url">app.donatalk.com</span>
      </div>

    </div>

    <!-- Tagline -->
    <p class="tagline">Share your cause and connect with supporters</p>

    <!-- Slide counter -->
    <span class="slide-counter">5 / 5</span>

  </div>
</body>
</html>
