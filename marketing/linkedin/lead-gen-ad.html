<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link rel="stylesheet" href="../brand.css">
  <title>DonaTalk — LinkedIn Lead Gen Ad</title>
  <style>
    .ad {
      width: 1200px;
      height: 628px;
      overflow: hidden;
      position: relative;
      display: flex;
    }

    /* ── Left panel (navy, 60%) ── */
    .ad__left {
      width: 60%;
      background-color: #2C3E50;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 56px 44px 56px;
      position: relative;
    }

    /* Subtle top accent bar */
    .ad__left::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, #C26148 0%, #E74C3C 100%);
    }

    .ad__left-body {
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex: 1;
      justify-content: center;
    }

    .ad__eyebrow {
      font-family: var(--font-family);
      font-weight: var(--font-medium);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #F8A5A5;
    }

    .ad__headline {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 36px;
      line-height: 1.22;
      color: #FFFFFF;
      max-width: 520px;
    }

    .ad__headline em {
      font-style: normal;
      color: #F1C40F;
    }

    .ad__subtext {
      font-family: var(--font-family);
      font-weight: var(--font-regular);
      font-size: 20px;
      line-height: 1.5;
      color: #ECF0F1;
      max-width: 460px;
      opacity: 0.88;
    }

    .ad__cta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 8px;
    }

    .ad__cta-btn {
      display: inline-block;
      padding: 15px 36px;
      background-color: #C26148;
      color: #FFFFFF;
      font-family: var(--font-family);
      font-weight: var(--font-semibold);
      font-size: 18px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.01em;
      text-decoration: none;
      white-space: nowrap;
      transition: background-color 0.2s;
    }

    .ad__cta-note {
      font-family: var(--font-family);
      font-weight: var(--font-light);
      font-size: 13px;
      color: rgba(236, 240, 241, 0.55);
      white-space: nowrap;
    }

    /* Logo at bottom-left */
    .ad__logo {
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .ad__logo-dona {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 22px;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: -0.3px;
    }

    .ad__logo-talk {
      font-family: var(--font-family);
      font-weight: var(--font-bold);
      font-size: 22px;
      color: #F8A5A5;
      letter-spacing: -0.3px;
    }

    /* ── Right panel (beige, 40%) ── */
    .ad__right {
      width: 40%;
      background-color: #EBE8E6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 44px;
      gap: 36px;
    }

    .ad__icon-primary {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ad__icon-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.72;
    }

    .ad__icon-divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C26148, transparent);
      border-radius: 1px;
    }
  </style>
</head>
<body>
  <div class="ad">

    <!-- ── Left: Navy panel ── -->
    <div class="ad__left">
      <div class="ad__left-body">
        <span class="ad__eyebrow">For Sales Professionals</span>

        <h1 class="ad__headline">
          Get Warm Sales Meetings<br>
          by <em>Giving Back</em>
        </h1>

        <p class="ad__subtext">
          Donate to your prospect's cause.<br>They take your call.
        </p>

        <div class="ad__cta-row">
          <a class="ad__cta-btn" href="https://app.donatalk.com/pitcher/signup">Sign Up Free</a>
          <span class="ad__cta-note">No credit card required</span>
        </div>
      </div>

      <!-- Logo lockup at bottom -->
      <div class="ad__logo">
        <img src="../png/logo-horizontal-with-text-2.webp" height="30" alt="DonaTalk">
      </div>
    </div>

    <!-- ── Right: Beige panel ── -->
    <div class="ad__right">

      <!-- Heart-in-speech-bubble icon (~150px) -->
      <div class="ad__icon-primary">
        <img src="../png/DonaTalk_icon_88x77.png" width="150" alt="DonaTalk icon">
      </div>

      <div class="ad__icon-divider"></div>

      <!-- Hero illustration -->
      <div class="ad__icon-secondary">
        <img src="../png/DonaTalk_Hero_300x222.webp" width="200" alt="DonaTalk hero illustration">
      </div>

    </div>

  </div>
</body>
</html>
