<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="../brand.css">
  <title>Cold Email Stat — DonaTalk</title>
  <style>
    .card {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      background-color: #EBE8E6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      text-align: center;
    }

    .stat-number {
      font-size: 300px;
      font-weight: 700;
      color: #E74C3C;
      line-height: 0.9;
      letter-spacing: -8px;
      margin-bottom: 32px;
    }

    .stat-label {
      font-size: 28px;
      font-weight: 500;
      color: #1D1F25;
      line-height: 1.4;
      margin-bottom: 28px;
      max-width: 700px;
    }

    .tagline {
      font-size: 22px;
      font-weight: 400;
      color: #5D6670;
      line-height: 1.5;
      max-width: 660px;
      margin-bottom: 0;
    }

    .cta-text {
      position: absolute;
      bottom: 72px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      color: #C26148;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="stat-number">1%</div>
    <p class="stat-label">That's the average cold email response rate.</p>
    <p class="tagline">DonaTalk gives prospects a reason to say yes.</p>

    <div class="cta-text">Learn more at donatalk.com</div>
  </div>
</body>
</html>
