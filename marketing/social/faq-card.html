<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="../brand.css">
  <title>FAQ Card — DonaTalk</title>
  <style>
    body {
      background: #EBE8E6;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1080px;
      height: 1080px;
    }

    .card {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      background-color: #FFFFFF;
      border: 4px solid #EBE8E6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 100px;
      text-align: left;
    }

    .heading {
      font-size: 40px;
      font-weight: 700;
      color: #1D1F25;
      text-align: center;
      margin-bottom: 72px;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    .checklist {
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
      max-width: 820px;
      margin-bottom: 80px;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      font-size: 24px;
      font-weight: 400;
      color: #1D1F25;
      line-height: 1.5;
      margin-bottom: 44px;
    }

    .checklist li:last-child {
      margin-bottom: 0;
    }

    .check-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background-color: #E74C3C;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .check-icon svg {
      display: block;
    }

    .cta-signup {
      font-size: 26px;
      font-weight: 700;
      color: #C26148;
      text-align: center;
      margin-bottom: 56px;
      letter-spacing: 0.2px;
    }

    .logo-bottom {
      text-align: center;
    }

    .logo-text {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text .dona {
      color: #2C3E50;
    }

    .logo-text .talk {
      color: #E74C3C;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="heading">Is DonaTalk right for you?</h1>

    <ul class="checklist">
      <li>
        <div class="check-icon">
          <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8 L8 14 L20 2" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>You're in sales and tired of cold outreach</span>
      </li>
      <li>
        <div class="check-icon">
          <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8 L8 14 L20 2" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>You believe in supporting non-profits</span>
      </li>
      <li>
        <div class="check-icon">
          <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 8 L8 14 L20 2" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span>You want warm introductions, not cold calls</span>
      </li>
    </ul>

    <p class="cta-signup">Sign up free at app.donatalk.com</p>

    <div class="logo-bottom">
      <img src="../png/logo-horizontal-with-text-2.webp" height="36" alt="DonaTalk">
    </div>
  </div>
</body>
</html>
