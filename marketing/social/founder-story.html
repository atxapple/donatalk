<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <link rel="stylesheet" href="../brand.css">
  <title>Founder Story — DonaTalk</title>
  <style>
    .card {
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      background-color: #2C3E50;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }

    .quote-mark {
      position: absolute;
      top: 48px;
      left: 64px;
      font-size: 220px;
      font-weight: 700;
      color: #F8A5A5;
      line-height: 1;
      font-family: Georgia, serif;
      user-select: none;
      opacity: 0.9;
    }

    .content {
      position: relative;
      z-index: 1;
      margin-top: 80px;
    }

    .title {
      font-size: 40px;
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }

    .body-text {
      font-size: 22px;
      font-weight: 400;
      color: #ECF0F1;
      line-height: 1.6;
      max-width: 900px;
    }

    .logo-bottom {
      position: absolute;
      bottom: 64px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-text .dona {
      color: #FFFFFF;
    }

    .logo-text .talk {
      color: #F8A5A5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="quote-mark">&ldquo;</div>

    <div class="content">
      <h1 class="title">Why I built DonaTalk</h1>
      <p class="body-text">
        I watched sales reps struggle with cold outreach every day. What if every pitch also helped a non-profit? That question became DonaTalk &mdash; a platform where sales professionals earn meetings by giving back to causes their prospects care about.
      </p>
    </div>

    <div class="logo-bottom">
      <span class="logo-text"><span class="dona">Dona</span><span class="talk">Talk</span></span>
    </div>
  </div>
</body>
</html>
